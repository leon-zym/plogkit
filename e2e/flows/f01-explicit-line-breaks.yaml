appId: com.leonzym.plogkit
name: Explicit Chinese line breaks remain selectable and draggable
---
- runFlow: ../subflows/import-two-photos.yaml
- tapOn:
    id: editor-tool-text
- assertVisible: Add text
- tapOn:
    id: text-input
- setClipboard: |-
    第一行
    第二行
    第三行
- pasteText
- runFlow: ../subflows/dismiss-keyboard.yaml
- assertVisible:
    id: text-input
    text: |-
      第一行
      第二行
      第三行
- runFlow: ../subflows/scroll-and-apply-text-edits.yaml
- assertVisible:
    id: canvas-text-hit-0-.*
- runFlow: ../subflows/reenter-session-unselected.yaml
- assertVisible:
    id: canvas-text-hit-0-.*
# The third line has a deterministic canvas position. A first-line-only hit
# region cannot make this coordinate move with itself.
- tapOn:
    id: document-canvas
    point: 14%, 11%
- assertVisible:
    id: canvas-text-hit-0-.*
    selected: true
- assertVisible:
    id: canvas-text-selection-.*
- swipe:
    from:
      id: canvas-text-hit-0-.*
    direction: LEFT
    duration: 500
- tapOn:
    id: editor-undo
- assertVisible:
    id: canvas-text-hit-0-.*
