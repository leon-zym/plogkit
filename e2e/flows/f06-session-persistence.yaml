appId: com.leonzym.plogkit
name: Reopen a persisted Draft from the Library after relaunch
---
- runFlow: ../subflows/import-two-photos.yaml
- tapOn:
    id: background-color-c9d3c2
- tapOn:
    id: editor-back
- extendedWaitUntil:
    visible:
      id: draft-item-0
    timeout: 10000
- stopApp
- launchApp
- extendedWaitUntil:
    visible:
      id: home-screen
    timeout: 30000
- assertVisible:
    id: choose-photos
- assertVisible:
    id: draft-item-0
- tapOn:
    id: draft-item-0
- assertVisible:
    id: editor-screen
- runFlow:
    file: ../subflows/assert-radio-checked.yaml
    env:
      OPTION_ID: background-color-c9d3c2
