name: Mobile simulator E2E

on:
  schedule:
    # Monday 02:30 Asia/Shanghai (Sunday 18:30 UTC).
    - cron: "30 18 * * 0"
  workflow_dispatch:
    inputs:
      platform:
        description: Platform suite to run
        required: true
        default: all
        type: choice
        options:
          - all
          - ios
          - android
      flow:
        description: Optional flow basename, for example f06-session-persistence
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && github.run_id || github.ref }}
  cancel-in-progress: true

jobs:
  ios-maestro:
    name: iOS Maestro acceptance suite
    if: github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'ios'
    runs-on: macos-26
    timeout-minutes: 60
    env:
      E2E_BUILD_WORKERS: "2"
      MAESTRO_CLI_ANALYSIS_NOTIFICATION_DISABLED: "true"
      MAESTRO_CLI_NO_ANALYTICS: "true"
      MAESTRO_DISABLE_UPDATE_CHECK: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: pnpm install --frozen-lockfile
      - name: Install Maestro CLI
        run: |
          export MAESTRO_VERSION=2.7.0
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
      - name: Build iOS development app
        run: node scripts/e2e/run.mjs ios --phase build
        env:
          E2E_ARTIFACTS_DIR: ${{ runner.temp }}/plogkit-e2e
      - name: Run iOS Maestro flows
        run: node scripts/e2e/run.mjs ios --phase test
        env:
          E2E_ARTIFACTS_DIR: ${{ runner.temp }}/plogkit-e2e
          E2E_FLOW: ${{ inputs.flow }}
      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-maestro-artifacts
          if-no-files-found: ignore
          path: ${{ runner.temp }}/plogkit-e2e

  android-maestro:
    name: Android Maestro acceptance suite
    if: github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'android'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      E2E_BUILD_WORKERS: "2"
      MAESTRO_CLI_ANALYSIS_NOTIFICATION_DISABLED: "true"
      MAESTRO_CLI_NO_ANALYTICS: "true"
      MAESTRO_DISABLE_UPDATE_CHECK: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: pnpm install --frozen-lockfile
      - name: Install Maestro CLI
        run: |
          export MAESTRO_VERSION=2.7.0
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
      - name: Build Android development app
        run: node scripts/e2e/run.mjs android --phase build
        env:
          E2E_ARTIFACTS_DIR: ${{ runner.temp }}/plogkit-e2e
      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run emulator and Maestro flows
        uses: reactivecircus/android-emulator-runner@v2.38.0
        with:
          api-level: 36
          arch: x86_64
          profile: pixel_7_pro
          target: default
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: node scripts/e2e/run.mjs android --phase test --device "$ANDROID_SERIAL"
        env:
          E2E_ARTIFACTS_DIR: ${{ runner.temp }}/plogkit-e2e
          E2E_FLOW: ${{ inputs.flow }}
      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-maestro-artifacts
          if-no-files-found: ignore
          path: ${{ runner.temp }}/plogkit-e2e
