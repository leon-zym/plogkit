appId: com.leonzym.plogkit
name: Switch to grid and reorder imported photos
---
- runFlow: ../subflows/import-two-photos.yaml
- tapOn:
    id: editor-tool-stitch
- assertVisible: Stitch
- tapOn:
    id: stitch-mode-grid
- scrollUntilVisible:
    element:
      text: Move photo later 1
    direction: DOWN
- assertVisible: "^0$"
- swipe:
    from:
      id: stitch-spacing
    direction: RIGHT
    duration: 500
- assertVisible: "^(4|8|12|16|20|24|28|32|36|40|44|48|52|56|60|64)$"
- tapOn: Move photo later 1
- assertVisible:
    id: editor-undo
