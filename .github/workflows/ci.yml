name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Static, unit, and render verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify

  android-build-check:
    # One ABI is sufficient for the development-client native-integration compile gate.
    # Store-ready release packaging is a separate workflow that is not configured yet.
    name: Android compile check
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec expo prebuild --platform android --no-install
      - run: ./gradlew app:assembleDebug --no-daemon --max-workers=2 -PreactNativeArchitectures=arm64-v8a
        working-directory: android

  ios-build-check:
    # Compile against a generic simulator destination without booting a device.
    # Full simulator behavior remains covered by the weekly and manual E2E workflow.
    name: iOS compile check
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec expo prebuild --platform ios
      - run: |
          xcodebuild \
            -workspace ios/PlogKit.xcworkspace \
            -scheme PlogKit \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath ios/build \
            -jobs 2 \
            ARCHS="$(uname -m)" \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGNING_ALLOWED=NO \
            build
