appId: com.leonzym.plogkit
name: Global metadata default stays local and independent
---
- runFlow: ../subflows/launch-app.yaml
- assertVisible:
    id: home-screen
- tapOn:
    id: open-settings
- assertVisible:
    id: settings-screen
- tapOn:
    id: settings-retain-basic
- assertVisible: GPS location is always removed.*
- tapOn:
    id: settings-back
- assertVisible:
    id: home-screen
