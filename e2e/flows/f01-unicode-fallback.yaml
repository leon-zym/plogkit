appId: com.leonzym.plogkit
name: Chinese emoji and fallback glyphs remain selectable and draggable
---
- runFlow: ../subflows/import-two-photos.yaml
- tapOn:
    id: editor-tool-text
- assertVisible: Add text
- tapOn:
    id: text-input
- setClipboard: "🏖️ 周末海边 ☀️ 美好时光 😊"
- pasteText
- runFlow: ../subflows/dismiss-keyboard.yaml
- assertVisible:
    id: text-input
    text: "🏖️ 周末海边 ☀️ 美好时光 😊"
- runFlow: ../subflows/scroll-and-apply-text-edits.yaml
- assertVisible:
    id: canvas-text-hit-0-.*
- runFlow: ../subflows/reenter-session-unselected.yaml
- assertVisible:
    id: canvas-text-hit-0-.*
- tapOn:
    id: canvas-text-hit-0-.*
- assertVisible:
    id: canvas-text-hit-0-.*
    selected: true
- assertVisible:
    id: canvas-text-selection-.*
- swipe:
    from:
      id: canvas-text-hit-0-.*
    direction: RIGHT
    duration: 500
- tapOn:
    id: editor-undo
- assertVisible:
    id: canvas-text-hit-0-.*
